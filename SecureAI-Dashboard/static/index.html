<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureAI Guard | نظام خدمة العملاء المحصن</title>
    <!-- تضمين مكتبة Tailwind CSS للتصميم السريع والاحترافي -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-slate-800 rounded-2xl shadow-2xl p-6 md:p-8 border border-slate-700">
        <!-- رأس الصفحة -->
        <div class="text-center mb-6">
            <span class="bg-indigo-500/10 text-indigo-400 text-xs font-semibold px-3 py-1 rounded-full border border-indigo-500/20">محمي بأحدث معايير الأمان المحلية</span>
            <h1 class="text-2xl font-bold mt-2 text-white">نظام حماية ودعم العملاء الذكي</h1>
            <p class="text-slate-400 text-sm mt-1">أدخل بياناتك وشكواك، وسيقوم النظام بفحصها أمنياً ومعالجتها عبر نموذج ذكاء اصطناعي محلي.</p>
        </div>

        <!-- النموذج (Form) -->
        <form id="complaintForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">رقم الجوال (مثال: 0512345678)</label>
                <input type="text" id="phone" required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition"
                    placeholder="05xxxxxxxx">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">نص الشكوى أو الطلب</label>
                <textarea id="complaint" rows="4" required
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition"
                    placeholder="اكتب استفسارك أو مشكلتك هنا..."></textarea>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-lg shadow-indigo-600/30">
                إرسال الطلب بشكل آمن 🛡️
            </button>
        </form>

        <!-- صندوق النتائج -->
        <div id="resultBox" class="mt-6 hidden p-4 rounded-xl border">
            <h3 id="resultTitle" class="font-bold text-sm mb-2"></h3>
            <div id="resultContent" class="text-sm space-y-2 text-slate-300"></div>
        </div>
    </div>

    <!-- كود الجافاسكريبت للربط مع الـ Backend -->
    <script>
        const form = document.getElementById('complaintForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('resultBox');
        const resultTitle = document.getElementById('resultTitle');
        const resultContent = document.getElementById('resultContent');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone_number = document.getElementById('phone').value;
            const complaint_text = document.getElementById('complaint').value;

            // تأثير التحميل
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري المعالجة والفحص الأمني...";
            resultBox.classList.add('hidden');

            try {
                const response = await fetch('/api/process-complaint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number, complaint_text })
                });

                const data = await response.json();
                
                resultBox.classList.remove('hidden');

                if (data.success) {
                    resultBox.className = "mt-6 p-4 rounded-xl border bg-emerald-950/40 border-emerald-500/30 text-emerald-200";
                    resultTitle.innerText = `✅ تم الرد بنجاح (العميل: ${data.customer_name})`;
                    resultContent.innerHTML = `
                        <p><strong>النص بعد التعقيم الأمني:</strong> <span class="text-slate-400">${data.sanitized_input}</span></p>
                        <hr class="border-emerald-500/20 my-2">
                        <p class="whitespace-pre-line text-white font-medium"><strong>رد الذكاء الاصطناعي:</strong><br>${data.ai_response}</p>
                    `;
                } else {
                    resultBox.className = "mt-6 p-4 rounded-xl border bg-rose-950/40 border-rose-500/30 text-rose-200";
                    resultTitle.innerText = `❌ تم رفض الطلب أمنياً (${data.security_flag || 'خطأ'})`;
                    resultContent.innerHTML = `<p>${data.message}</p>`;
                }

            } catch (error) {
                resultBox.classList.remove('hidden');
                resultBox.className = "mt-6 p-4 rounded-xl border bg-rose-950/40 border-rose-500/30 text-rose-200";
                resultTitle.innerText = "❌ خطأ في الاتصال بالخادم";
                resultContent.innerHTML = `<p>${error.message}</p>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "إرسال الطلب بشكل آمن 🛡️";
            }
        });
    </script>
</body>
</html>
